<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPD RSKD</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="navlogo">
                <img class="imglogo" src="/assets/images/rsk dharmais.png" alt="logoupd.png">
                <h1 class="tekslogo">Unit Pelayanan Darah RSKD</h1>
            </div>
            <ul>
                <li><a href="#">Contact</a></li>
                <li><a href="#">Information</a></li>
                <li><a href="#">Mobile Unit</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="container-card">
            <div class="header">
                <h1>WELCOME</h1>
            </div>
            <form>
                <div class="kotak-input">
                    <div class="isi username">
                        <label for="username"><img src="/assets/images/user.png" alt="user"></label>
                        <input type="text" id="username" name="username" placeholder="Username" required>
                    </div>
                    <div class="isi password">
                        <label for="password"><img src="/assets/images/padlock.png" alt="pass"></label>
                        <input type="text" id="password" name="password" placeholder="Password" required>
                    </div>
                </div>
                <div class="btn submit">
                    <button type="button" class="btn" id="login">LOGIN</button>
                </div>
            </form>    
        </div>
    </main>
    <footer>
        <hr>
        All Right Reversed
    </footer>

    <script src="/assets/js/login.js"></script>

</body>
</html>
